databases:
  - name: smart-campus-db
    plan: free
    databaseName: smart_campus
    user: smart_campus_user

services:
  - type: web
    name: smart-campus-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-url.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.4"
